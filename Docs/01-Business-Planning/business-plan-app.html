<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07111f" />
  <title>Movit | وثيقة خطة العمل التفاعلية</title>
  <style>
    :root {
      --bg: #07111f;
      --surface: #0b1728;
      --surface-2: #101f35;
      --surface-3: #152845;
      --text: #f7fbff;
      --muted: #a7bad5;
      --soft: #d7e4f5;
      --line: rgba(255, 255, 255, 0.12);
      --brand: #4fd8ff;
      --brand-2: #8c6cff;
      --green: #46e6a6;
      --yellow: #ffd166;
      --red: #ff6f91;
      --orange: #ff9f45;
      --shadow: 0 20px 70px rgba(0, 0, 0, 0.35);
      --radius: 24px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --tab-height: 76px;
    }

    [data-theme="light"] {
      --bg: #eff5ff;
      --surface: #ffffff;
      --surface-2: #f5f8ff;
      --surface-3: #eaf1ff;
      --text: #0c1830;
      --muted: #53657f;
      --soft: #20324d;
      --line: rgba(10, 23, 45, 0.13);
      --shadow: 0 20px 60px rgba(50, 76, 122, 0.16);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 85% 0%, rgba(79, 216, 255, 0.18), transparent 28rem),
        radial-gradient(circle at 5% 12%, rgba(140, 108, 255, 0.16), transparent 26rem),
        linear-gradient(180deg, var(--bg), #060b14 120%);
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      line-height: 1.75;
      overflow-x: hidden;
    }

    [data-theme="light"] body,
    body[data-theme="light"] {
      background:
        radial-gradient(circle at 85% 0%, rgba(79, 216, 255, 0.18), transparent 28rem),
        radial-gradient(circle at 5% 12%, rgba(140, 108, 255, 0.14), transparent 26rem),
        linear-gradient(180deg, var(--bg), #ffffff 120%);
    }

    button,
    input {
      font: inherit;
    }

    button {
      min-height: 44px;
    }

    h1,
    h2,
    h3,
    h4,
    p {
      margin-top: 0;
    }

    .app {
      min-height: 100vh;
      padding-bottom: calc(var(--tab-height) + var(--safe-bottom) + 18px);
    }

    .app-bar {
      position: sticky;
      top: 0;
      z-index: 30;
      padding: max(10px, env(safe-area-inset-top, 0px)) 14px 10px;
      background: color-mix(in srgb, var(--bg) 78%, transparent);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
    }

    .app-bar-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      max-width: 760px;
      margin: 0 auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      color: #04111c;
      font-weight: 1000;
      background: linear-gradient(135deg, var(--brand), var(--green));
      box-shadow: 0 12px 32px rgba(79, 216, 255, 0.18);
      flex: 0 0 auto;
    }

    .brand small {
      display: block;
      color: var(--muted);
      font-size: 0.76rem;
      line-height: 1.2;
    }

    .brand strong {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.25;
    }

    .icon-row {
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      color: var(--text);
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface) 82%, transparent);
      cursor: pointer;
    }

    .read-progress {
      height: 4px;
      max-width: 760px;
      margin: 10px auto 0;
      border-radius: 999px;
      overflow: hidden;
      background: color-mix(in srgb, var(--surface-3) 60%, transparent);
    }

    .read-progress span {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--brand-2), var(--brand), var(--green));
    }

    .viewport {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 18px 14px 0;
    }

    .view {
      display: none;
      animation: fadeUp 240ms ease both;
    }

    .view.active {
      display: block;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero-card,
    .card,
    .chapter-card,
    .bottom-sheet-panel,
    .callout,
    .metric-card,
    .risk-card,
    .loop-card {
      border: 1px solid var(--line);
      background: linear-gradient(145deg, color-mix(in srgb, var(--surface) 92%, transparent), color-mix(in srgb, var(--surface-2) 86%, transparent));
      box-shadow: var(--shadow);
      border-radius: var(--radius);
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      padding: 26px 20px;
      min-height: 430px;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      inset: auto -90px -120px auto;
      width: 260px;
      height: 260px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(70, 230, 166, 0.2), transparent 68%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 6px 11px;
      border-radius: 999px;
      color: var(--green);
      background: color-mix(in srgb, var(--green) 11%, transparent);
      border: 1px solid color-mix(in srgb, var(--green) 28%, transparent);
      font-size: 0.82rem;
      font-weight: 800;
      margin-bottom: 14px;
    }

    h1 {
      font-size: clamp(2.05rem, 11vw, 4.2rem);
      line-height: 1.08;
      letter-spacing: -1px;
      margin-bottom: 16px;
    }

    .gradient {
      background: linear-gradient(90deg, var(--brand), var(--green), var(--text));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .lead {
      color: var(--muted);
      font-size: 1.03rem;
      margin-bottom: 18px;
    }

    .hero-actions,
    .row-actions,
    .chip-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      color: #03111d;
      background: linear-gradient(135deg, var(--green), var(--brand));
      font-weight: 900;
      cursor: pointer;
    }

    .btn.secondary {
      color: var(--text);
      background: color-mix(in srgb, var(--surface-3) 72%, transparent);
      border: 1px solid var(--line);
    }

    .stats-strip {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 22px;
      position: relative;
      z-index: 1;
    }

    .mini-stat {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: color-mix(in srgb, var(--surface-3) 55%, transparent);
    }

    .mini-stat strong {
      display: block;
      font-size: 1.35rem;
      line-height: 1.2;
      color: var(--text);
    }

    .mini-stat span {
      display: block;
      color: var(--muted);
      font-size: 0.84rem;
      margin-top: 4px;
    }

    .section-title {
      margin: 26px 0 12px;
    }

    .section-title h2 {
      margin-bottom: 4px;
      font-size: 1.55rem;
      line-height: 1.25;
    }

    .section-title p {
      color: var(--muted);
      margin-bottom: 0;
    }

    .card {
      padding: 18px;
      margin-bottom: 12px;
      box-shadow: none;
    }

    .card h3 {
      margin-bottom: 8px;
    }

    .card p {
      color: var(--muted);
      margin-bottom: 0;
    }

    .decision-list {
      display: grid;
      gap: 10px;
    }

    .decision {
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 12px;
      align-items: start;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: color-mix(in srgb, var(--surface-2) 72%, transparent);
    }

    .decision span {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 14px;
      color: #04111c;
      font-weight: 1000;
      background: linear-gradient(135deg, var(--brand), var(--green));
    }

    .decision strong {
      display: block;
      margin-bottom: 2px;
    }

    .decision small {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .stage-selector {
      position: sticky;
      top: 72px;
      z-index: 20;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      overscroll-behavior-x: contain;
      padding: 10px 0 12px;
      margin: -4px -2px 8px;
      scrollbar-width: none;
      background: linear-gradient(180deg, var(--bg), color-mix(in srgb, var(--bg) 78%, transparent));
    }

    .stage-selector::-webkit-scrollbar {
      display: none;
    }

    .stage-chip,
    .tag,
    .search-result {
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface) 78%, transparent);
    }

    .stage-chip {
      color: var(--muted);
      border-radius: 999px;
      padding: 10px 13px;
      white-space: nowrap;
      cursor: pointer;
    }

    .stage-chip.active {
      color: #04111c;
      border-color: transparent;
      background: linear-gradient(135deg, var(--green), var(--brand));
      font-weight: 900;
    }

    .stage-hero {
      padding: 22px;
      border-radius: 28px;
      margin-bottom: 14px;
      background:
        radial-gradient(circle at 15% 10%, color-mix(in srgb, var(--brand) 18%, transparent), transparent 48%),
        linear-gradient(145deg, color-mix(in srgb, var(--surface) 92%, transparent), color-mix(in srgb, var(--surface-2) 88%, transparent));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .stage-hero h2 {
      font-size: 1.8rem;
      line-height: 1.22;
      margin-bottom: 10px;
    }

    .stage-progress {
      height: 9px;
      border-radius: 999px;
      overflow: hidden;
      background: color-mix(in srgb, var(--surface-3) 62%, transparent);
      margin: 16px 0 4px;
    }

    .stage-progress span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--brand-2), var(--brand), var(--green));
    }

    .chapter-card {
      display: block;
      width: 100%;
      text-align: inherit;
      color: inherit;
      padding: 16px;
      box-shadow: none;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .chapter-card:active {
      transform: scale(0.99);
    }

    .chapter-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .doc-code {
      display: inline-grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 15px;
      flex: 0 0 auto;
      font-weight: 1000;
      color: #04111c;
      background: linear-gradient(135deg, var(--brand), var(--green));
    }

    .chapter-card h3 {
      margin-bottom: 6px;
      font-size: 1.15rem;
      line-height: 1.35;
    }

    .chapter-card p {
      color: var(--muted);
      margin: 0;
    }

    .tag-row {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 9px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .tag.green {
      color: var(--green);
      border-color: color-mix(in srgb, var(--green) 30%, transparent);
      background: color-mix(in srgb, var(--green) 8%, transparent);
    }

    .tag.yellow {
      color: var(--yellow);
      border-color: color-mix(in srgb, var(--yellow) 30%, transparent);
      background: color-mix(in srgb, var(--yellow) 8%, transparent);
    }

    .stage-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 16px 0 4px;
    }

    .dashboard-grid {
      display: grid;
      gap: 12px;
    }

    .funnel {
      display: grid;
      gap: 9px;
    }

    .funnel-step {
      padding: 13px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface-2) 76%, transparent);
    }

    .funnel-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .bar {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: color-mix(in srgb, var(--surface-3) 72%, transparent);
    }

    .bar span {
      display: block;
      height: 100%;
      width: var(--value);
      background: linear-gradient(90deg, var(--brand-2), var(--brand), var(--green));
      border-radius: inherit;
    }

    .metric-grid,
    .loop-grid,
    .risk-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .metric-card,
    .risk-card,
    .loop-card {
      padding: 16px;
      box-shadow: none;
    }

    .metric-value {
      font-size: 2.2rem;
      line-height: 1;
      color: var(--green);
      font-weight: 1000;
      margin: 10px 0 6px;
    }

    .loop-card details,
    .risk-card details {
      margin-top: 8px;
    }

    summary {
      cursor: pointer;
      color: var(--brand);
      font-weight: 800;
      min-height: 38px;
      display: flex;
      align-items: center;
    }

    .risk-card.high {
      border-top: 4px solid var(--red);
    }

    .risk-card.medium {
      border-top: 4px solid var(--yellow);
    }

    .check-summary {
      text-align: center;
      padding: 20px;
    }

    .ring {
      --p: 0;
      width: 172px;
      height: 172px;
      border-radius: 50%;
      margin: 8px auto 16px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle closest-side, var(--surface) 74%, transparent 75%),
        conic-gradient(var(--green) calc(var(--p) * 1%), color-mix(in srgb, var(--surface-3) 78%, transparent) 0);
      border: 1px solid var(--line);
    }

    .ring strong {
      font-size: 2rem;
    }

    .check-group {
      margin-bottom: 18px;
    }

    .check-item {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 12px;
      align-items: start;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface-2) 70%, transparent);
      margin-bottom: 10px;
    }

    .check-item input {
      width: 22px;
      height: 22px;
      accent-color: var(--green);
      margin-top: 4px;
    }

    .check-item strong {
      display: block;
      margin-bottom: 2px;
    }

    .check-item span {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .bottom-tabs {
      position: fixed;
      inset: auto 0 0 0;
      z-index: 35;
      padding: 9px 12px calc(9px + var(--safe-bottom));
      border-top: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 84%, transparent);
      backdrop-filter: blur(20px);
    }

    .bottom-tabs-inner {
      width: min(100%, 760px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .tab-btn {
      display: grid;
      place-items: center;
      gap: 2px;
      border: 0;
      border-radius: 18px;
      color: var(--muted);
      background: transparent;
      padding: 8px 4px;
      cursor: pointer;
      min-height: 58px;
    }

    .tab-btn span {
      font-size: 1.16rem;
      line-height: 1;
    }

    .tab-btn small {
      font-size: 0.72rem;
      white-space: nowrap;
    }

    .tab-btn.active {
      color: #04111c;
      background: linear-gradient(135deg, var(--green), var(--brand));
      font-weight: 900;
    }

    .bottom-sheet {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      align-items: flex-end;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(10px);
    }

    .bottom-sheet.open {
      display: flex;
    }

    .bottom-sheet-panel {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      max-height: min(88vh, 860px);
      overflow: auto;
      border-radius: 28px 28px 0 0;
      padding: 10px 14px calc(22px + var(--safe-bottom));
      animation: sheetUp 220ms ease both;
    }

    @keyframes sheetUp {
      from {
        transform: translateY(40px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .sheet-handle {
      width: 48px;
      height: 5px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--muted) 45%, transparent);
      margin: 2px auto 12px;
    }

    .sheet-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .sheet-title h2 {
      font-size: 1.55rem;
      line-height: 1.25;
      margin-bottom: 6px;
    }

    .sheet-title p {
      color: var(--muted);
      margin-bottom: 0;
    }

    .sheet-body {
      padding-bottom: 18px;
    }

    .block {
      margin-bottom: 14px;
    }

    .block h3 {
      font-size: 1.16rem;
      margin-bottom: 8px;
    }

    .block p,
    .block li {
      color: var(--muted);
    }

    .block ul,
    .block ol {
      padding: 0 22px 0 0;
      margin: 0;
    }

    .callout {
      padding: 15px;
      box-shadow: none;
      border-right: 4px solid var(--brand);
    }

    .callout.warning {
      border-right-color: var(--yellow);
    }

    .callout.danger {
      border-right-color: var(--red);
    }

    .quote {
      padding: 16px;
      border-radius: 20px;
      color: var(--soft);
      background: color-mix(in srgb, var(--brand) 9%, transparent);
      border: 1px solid color-mix(in srgb, var(--brand) 22%, transparent);
      font-size: 1.08rem;
      font-weight: 800;
    }

    .grid-block {
      display: grid;
      gap: 10px;
    }

    .mini-card {
      padding: 13px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface-2) 72%, transparent);
    }

    .mini-card h4 {
      margin-bottom: 6px;
    }

    .mini-card p {
      color: var(--muted);
      margin-bottom: 0;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 18px;
      border: 1px solid var(--line);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 520px;
      background: color-mix(in srgb, var(--surface-2) 72%, transparent);
    }

    th,
    td {
      text-align: right;
      vertical-align: top;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    th {
      color: var(--text);
      background: color-mix(in srgb, var(--surface-3) 78%, transparent);
    }

    td {
      color: var(--muted);
    }

    .split {
      display: grid;
      gap: 10px;
    }

    .search-input {
      width: 100%;
      min-height: 52px;
      padding: 12px 15px;
      border-radius: 18px;
      color: var(--text);
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface-2) 80%, transparent);
      outline: 0;
      margin-bottom: 12px;
    }

    .search-result {
      display: block;
      width: 100%;
      color: var(--text);
      text-align: inherit;
      border-radius: 18px;
      padding: 14px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .search-result small {
      display: block;
      color: var(--green);
      margin-bottom: 3px;
    }

    .search-result p {
      color: var(--muted);
      margin: 0;
    }

    .empty {
      padding: 18px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 18px;
    }

    .reveal {
      opacity: 0;
      transform: translateY(12px);
      transition: 360ms ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (min-width: 700px) {
      .stats-strip,
      .metric-grid,
      .risk-grid,
      .loop-grid,
      .grid-block,
      .split {
        grid-template-columns: repeat(2, 1fr);
      }

      .hero-card {
        min-height: 360px;
        padding: 34px;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header class="app-bar">
      <div class="app-bar-row">
        <div class="brand">
          <div class="brand-mark">M</div>
          <div>
            <small>Movit Business Plan</small>
            <strong id="appTitle">وثيقة خطة العمل</strong>
          </div>
        </div>

            <div class="decision reveal">
              <span>${index + 1}</span>
              <div><strong>${escapeHtml(item[0])}</strong><small>${escapeHtml(item[1])}</small></div>
            </div>
          `).join("")}
        </div>

        <div class="section-title reveal">
          <h2>كيف تستخدم الوثيقة؟</h2>
          <p>استخدمها كخريطة تنفيذ وليست عرضاً ثابتاً.</p>
        </div>
        <div class="card reveal">
          <h3>طريقة القراءة المقترحة</h3>
          <p>ابدأ من تبويب الرحلة لفهم المنطق المرحلي، ثم افتح الفصول حسب الحاجة. استخدم لوحة القرار لمراجعة المقاييس والمخاطر، ثم الجاهزية قبل تشغيل أول 20 مستخدم.</p>
        </div>
      `;
    }

    function renderJourney() {
      const stage = appData.stages[state.stageIndex];
      els.journey.innerHTML = `
        <div class="stage-selector">
          ${appData.stages.map((item, index) => `
            <button class="stage-chip ${index === state.stageIndex ? "active" : ""}" data-stage="${index}">
              ${item.number} ${escapeHtml(item.title)}
            </button>
          `).join("")}
        </div>
        <div class="stage-hero reveal" id="stageHero">
          <span class="eyebrow">المرحلة ${stage.number} من 06</span>
          <h2>${escapeHtml(stage.title)}</h2>
          <p class="lead">${escapeHtml(stage.subtitle)}</p>
          <p>${escapeHtml(stage.narrative)}</p>
          <div class="stage-progress"><span style="width:${((state.stageIndex + 1) / appData.stages.length) * 100}%"></span></div>
        </div>
        <div>
          ${stage.chapters.map((chapter, index) => `
            <button class="chapter-card reveal" data-chapter="${index}">
              <div class="chapter-top">
                <div>
                  <span class="tag green">${escapeHtml(chapter.file)}</span>
                  <h3>${escapeHtml(chapter.title)}</h3>
                </div>
                <span class="doc-code">${chapter.code}</span>
              </div>
              <p>${escapeHtml(chapter.summary)}</p>
              <div class="tag-row">${chapter.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div>
            </button>
          `).join("")}
        </div>
        <div class="stage-controls">
          <button class="btn secondary" id="prevStage">المرحلة السابقة</button>
          <button class="btn" id="nextStage">المرحلة التالية</button>
        </div>
      `;
    }

    function renderDashboard() {
      els.dashboard.innerHTML = `
        <div class="section-title reveal">
          <h2>لوحة القرار</h2>
          <p>الأرقام هنا ليست للزينة. كل رقم يؤدي إلى قرار: نكمل، نعدل، أو نؤجل.</p>
        </div>
        <div class="card reveal">
          <h3>Funnel القياس</h3>
          <div class="funnel">
            ${dashboardData.funnel.map(([label, value]) => `
              <div class="funnel-step">
                <div class="funnel-head"><strong>${escapeHtml(label)}</strong><span>${value}</span></div>
                <div class="bar" style="--value:${value}"><span></span></div>
              </div>
            `).join("")}
          </div>
        </div>

        <div class="section-title reveal">
          <h2>المقاييس الحاكمة</h2>
        </div>
        <div class="metric-grid">
          ${dashboardData.metrics.map(([value, title, text]) => `
            <div class="metric-card reveal">
              <span class="tag green">Target</span>
              <div class="metric-value">${escapeHtml(value)}</div>
              <h3>${escapeHtml(title)}</h3>
              <p>${escapeHtml(text)}</p>
            </div>
          `).join("")}
        </div>

        <div class="section-title reveal">
          <h2>حلقات Retention</h2>
        </div>
        <div class="loop-grid">
          ${dashboardData.loops.map(([title, badge, text]) => `
            <div class="loop-card reveal">
              <span class="tag yellow">${escapeHtml(badge)}</span>
              <h3>${escapeHtml(title)}</h3>
              <p>${escapeHtml(text)}</p>
            </div>
          `).join("")}
        </div>

        <div class="section-title reveal">
          <h2>خريطة المخاطر</h2>
        </div>
        <div class="risk-grid">
          ${dashboardData.risks.map(([level, title, text]) => `
            <div class="risk-card ${level} reveal">
              <span class="tag ${level === "high" ? "yellow" : ""}">${level === "high" ? "عالي" : "متوسط"}</span>
              <h3>${escapeHtml(title)}</h3>
              <p>${escapeHtml(text)}</p>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderReadiness() {
      els.readiness.innerHTML = `
        <div class="section-title reveal">
          <h2>جاهزية أول 20 مستخدم</h2>
          <p>قائمة تفاعلية محفوظة على نفس المتصفح. الهدف إغلاق ما يلزم قبل التجربة الدافئة.</p>
        </div>
        <div class="card check-summary reveal">
          <span class="eyebrow">Beta Readiness</span>
          <div class="ring" id="readyRing"><strong id="readyPercent">0%</strong></div>
          <div class="row-actions" style="justify-content:center">
            <button class="btn secondary" id="resetReady">إعادة ضبط القائمة</button>
          </div>
        </div>
        <div id="checklists">
          ${readinessGroups.map((group, groupIndex) => `
            <div class="check-group reveal">
              <h3>${escapeHtml(group.title)}</h3>
              ${group.items.map((item, itemIndex) => `
                <label class="check-item">
                  <input type="checkbox" data-check="${groupIndex}-${itemIndex}" />
                  <div><strong>${escapeHtml(item[0])}</strong><span>${escapeHtml(item[1])}</span></div>
                </label>
              `).join("")}
            </div>
          `).join("")}
        </div>
      `;
      restoreChecks();
      updateReadinessProgress();
    }

    function renderBlock(block) {
      const title = block.title ? `<h3>${escapeHtml(block.title)}</h3>` : "";
      if (block.type === "lead") return `<div class="block"><p class="lead">${escapeHtml(block.text)}</p></div>`;
      if (block.type === "quote") return `<div class="block quote">${escapeHtml(block.text)}</div>`;
      if (block.type === "callout") return `<div class="block callout ${block.tone || ""}">${title}<p>${escapeHtml(block.text)}</p></div>`;
      if (block.type === "list") return `<div class="block">${title}<ul>${block.items.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul></div>`;
      if (block.type === "steps") return `<div class="block">${title}<ol>${block.items.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ol></div>`;
      if (block.type === "grid") return `<div class="block">${title}<div class="grid-block">${block.items.map(([head, text]) => `<div class="mini-card"><h4>${escapeHtml(head)}</h4><p>${escapeHtml(text)}</p></div>`).join("")}</div></div>`;
      if (block.type === "principles") return `<div class="block">${title}<div class="grid-block">${block.items.map(([head, text]) => `<div class="mini-card"><span class="tag green">Principle</span><h4>${escapeHtml(head)}</h4><p>${escapeHtml(text)}</p></div>`).join("")}</div></div>`;
      if (block.type === "details") return `<div class="block">${title}${block.items.map(([head, text]) => `<details class="mini-card"><summary>${escapeHtml(head)}</summary><p>${escapeHtml(text)}</p></details>`).join("")}</div>`;
      if (block.type === "split") return `<div class="block">${title}<div class="split"><div class="mini-card"><h4>${escapeHtml(block.leftTitle)}</h4><ul>${block.left.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul></div><div class="mini-card"><h4>${escapeHtml(block.rightTitle)}</h4><ul>${block.right.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul></div></div></div>`;
      if (block.type === "stats") return `<div class="block">${title}<div class="stats-strip">${block.items.map(([value, text]) => `<div class="mini-stat"><strong>${escapeHtml(value)}</strong><span>${escapeHtml(text)}</span></div>`).join("")}</div></div>`;
      if (block.type === "table") return `<div class="block">${title}<div class="table-wrap"><table><thead><tr>${block.headers.map(header => `<th>${escapeHtml(header)}</th>`).join("")}</tr></thead><tbody>${block.rows.map(row => `<tr>${row.map(cell => `<td>${escapeHtml(cell)}</td>`).join("")}</tr>`).join("")}</tbody></table></div></div>`;
      if (block.type === "people") return `<div class="block">${title}<div class="tag-row">${block.items.map(item => `<span class="tag">${escapeHtml(item)}</span>`).join("")}</div></div>`;
      return "";
    }

    function openChapter(stageIndex, chapterIndex) {
      const stage = appData.stages[stageIndex];
      const chapter = stage.chapters[chapterIndex];
      state.activeChapter = { stageIndex, chapterIndex };
      els.sheetTag.textContent = `${chapter.code} • ${stage.title}`;
      els.sheetTitle.textContent = chapter.title;
      els.sheetSummary.textContent = chapter.summary;
      els.sheetBody.innerHTML = chapter.blocks.map(renderBlock).join("");
      openSheet(els.sheet);
    }

    function openSheet(sheetEl) {
      sheetEl.classList.add("open");
      sheetEl.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeSheet(sheetEl = els.sheet) {
      sheetEl.classList.remove("open");
      sheetEl.setAttribute("aria-hidden", "true");
      if (!els.sheet.classList.contains("open") && !els.searchSheet.classList.contains("open")) {
        document.body.style.overflow = "";
      }
    }

    function setView(view) {
      state.view = view;
      document.querySelectorAll(".view").forEach(el => el.classList.remove("active"));
      document.getElementById(`view-${view}`).classList.add("active");
      els.tabs.forEach(tab => tab.classList.toggle("active", tab.dataset.view === view));
      els.appTitle.textContent = document.getElementById(`view-${view}`).dataset.title;
      window.scrollTo({ top: 0, behavior: "smooth" });
      requestAnimationFrame(initReveal);
    }

    function setStage(index) {
      state.stageIndex = (index + appData.stages.length) % appData.stages.length;
      renderJourney();
      requestAnimationFrame(initReveal);
      const selector = document.querySelector(`.stage-chip[data-stage="${state.stageIndex}"]`);
      if (selector) selector.scrollIntoView({ inline: "center", block: "nearest", behavior: "smooth" });
    }

    function storageKey() {
      return "movit-plan-app-readiness";
    }

    function readChecks() {
      try {
        return JSON.parse(localStorage.getItem(storageKey())) || {};
      } catch {
        return {};
      }
    }

    function writeChecks(value) {
      localStorage.setItem(storageKey(), JSON.stringify(value));
    }

    function restoreChecks() {
      const checks = readChecks();
      document.querySelectorAll("[data-check]").forEach(input => {
        input.checked = !!checks[input.dataset.check];
      });
    }

    function updateReadinessProgress() {
      const inputs = Array.from(document.querySelectorAll("[data-check]"));
      if (!inputs.length) return;
      const done = inputs.filter(input => input.checked).length;
      const percent = Math.round((done / inputs.length) * 100);
      const ring = document.getElementById("readyRing");
      const label = document.getElementById("readyPercent");
      if (ring) ring.style.setProperty("--p", percent);
      if (label) label.textContent = `${percent}%`;
    }

    function renderSearchResults(query = "") {
      const normalized = query.trim().toLowerCase();
      const records = allChapters().filter(({ chapter, stage }) => {
        const haystack = `${stage.title} ${chapter.title} ${chapter.summary} ${chapter.tags.join(" ")} ${chapter.file} ${textFromBlocks(chapter.blocks)}`.toLowerCase();
        return !normalized || haystack.includes(normalized);
      });

      if (!records.length) {
        els.searchResults.innerHTML = `<div class="empty">لا توجد نتائج مطابقة.</div>`;
        return;
      }

      els.searchResults.innerHTML = records.map(({ stage, stageIndex, chapter, chapterIndex }) => `
        <button class="search-result" data-stage="${stageIndex}" data-chapter="${chapterIndex}">
          <small>${escapeHtml(stage.title)} • ${escapeHtml(chapter.file)}</small>
          <strong>${escapeHtml(chapter.title)}</strong>
          <p>${escapeHtml(chapter.summary)}</p>
        </button>
      `).join("");
    }

    function initReveal() {
      const targets = document.querySelectorAll(".reveal:not(.visible)");
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add("visible");
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.08 });
      targets.forEach(target => observer.observe(target));
    }

    function updateReadProgress() {
      const max = document.documentElement.scrollHeight - window.innerHeight;
      const value = max <= 0 ? 0 : (window.scrollY / max) * 100;
      els.readProgress.style.width = `${Math.min(100, Math.max(0, value))}%`;
    }

    function applyTheme(theme) {
      document.documentElement.dataset.theme = theme;
      document.body.dataset.theme = theme;
      localStorage.setItem("movit-plan-theme", theme);
    }

    function initTheme() {
      applyTheme(localStorage.getItem("movit-plan-theme") || "dark");
    }

    function bindEvents() {
      document.addEventListener("click", event => {
        const tab = event.target.closest(".tab-btn");
        if (tab) setView(tab.dataset.view);

        const go = event.target.closest("[data-go]");
        if (go) setView(go.dataset.go);

        if (event.target.closest("[data-open-search]")) {
          openSheet(els.searchSheet);
          renderSearchResults("");
          setTimeout(() => els.searchInput.focus(), 80);
        }

        const stageChip = event.target.closest("[data-stage]");
        if (stageChip && stageChip.classList.contains("stage-chip")) {
          setStage(Number(stageChip.dataset.stage));
        }

        const chapterCard = event.target.closest("[data-chapter]");
        if (chapterCard && chapterCard.classList.contains("chapter-card")) {
          openChapter(state.stageIndex, Number(chapterCard.dataset.chapter));
        }

        const searchResult = event.target.closest(".search-result");
        if (searchResult) {
          closeSheet(els.searchSheet);
          setView("journey");
          state.stageIndex = Number(searchResult.dataset.stage);
          renderJourney();
          openChapter(state.stageIndex, Number(searchResult.dataset.chapter));
        }

        if (event.target.id === "prevStage") setStage(state.stageIndex - 1);
        if (event.target.id === "nextStage") setStage(state.stageIndex + 1);
        if (event.target.id === "resetReady") {
          localStorage.removeItem(storageKey());
          restoreChecks();
          updateReadinessProgress();
        }
      });

      document.addEventListener("change", event => {
        const input = event.target.closest("[data-check]");
        if (!input) return;
        const checks = readChecks();
        checks[input.dataset.check] = input.checked;
        writeChecks(checks);
        updateReadinessProgress();
      });

      document.getElementById("closeSheet").addEventListener("click", () => closeSheet(els.sheet));
      document.getElementById("closeSearch").addEventListener("click", () => closeSheet(els.searchSheet));
      document.getElementById("searchBtn").addEventListener("click", () => {
        openSheet(els.searchSheet);
        renderSearchResults(els.searchInput.value);
        setTimeout(() => els.searchInput.focus(), 80);
      });
      document.getElementById("themeBtn").addEventListener("click", () => {
        const next = document.documentElement.dataset.theme === "light" ? "dark" : "light";
        applyTheme(next);
      });
      els.searchInput.addEventListener("input", () => renderSearchResults(els.searchInput.value));

      [els.sheet, els.searchSheet].forEach(sheet => {
        sheet.addEventListener("click", event => {
          if (event.target === sheet) closeSheet(sheet);
        });
      });

      document.addEventListener("keydown", event => {
        if (event.key === "Escape") {
          closeSheet(els.sheet);
          closeSheet(els.searchSheet);
        }
      });

      let startX = 0;
      els.journey.addEventListener("touchstart", event => {
        startX = event.touches[0].clientX;
      }, { passive: true });

      els.journey.addEventListener("touchend", event => {
        const diff = event.changedTouches[0].clientX - startX;
        if (Math.abs(diff) < 55) return;
        if (diff > 0) setStage(state.stageIndex - 1);
        else setStage(state.stageIndex + 1);
      }, { passive: true });

      [els.sheetPanel, document.querySelector("#searchSheet .bottom-sheet-panel")].forEach(panel => {
        panel.addEventListener("touchstart", event => {
          state.sheetStartY = event.touches[0].clientY;
        }, { passive: true });
        panel.addEventListener("touchend", event => {
          if (state.sheetStartY === null) return;
          const diff = event.changedTouches[0].clientY - state.sheetStartY;
          if (diff > 90 && panel.scrollTop < 8) closeSheet(panel.closest(".bottom-sheet"));
          state.sheetStartY = null;
        }, { passive: true });
      });

      window.addEventListener("scroll", updateReadProgress, { passive: true });
    }

    function init() {
      initTheme();
      renderHome();
      renderJourney();
      renderDashboard();
      renderReadiness();
      bindEvents();
      initReveal();
      updateReadProgress();
    }

    init();
  </script>
</body>
</html>
