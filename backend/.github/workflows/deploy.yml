name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend-main
  cancel-in-progress: true

jobs:
  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pose_db?schema=public
        run: npx prisma generate

      - name: Build project
        run: npm run build

  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -e

            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"

            cd /var/www/pose-backend

            echo "==> Syncing clean copy from origin/main..."
            git fetch origin main
            git reset --hard origin/main

            echo "==> Installing dependencies..."
            npm ci

            echo "==> Generating Prisma client..."
            npx prisma generate

            echo "==> Running migrations..."
            # Recover P3009 if a previous deploy left a migration in "failed"; no-op when not needed.
            npx prisma migrate resolve --rolled-back "20260505100000_unified_progression_refactor" || true
            npx prisma migrate resolve --rolled-back "20260607230000_string_workout_fields_to_enums" || true
            npx prisma migrate deploy

            echo "==> Building..."
            npm run build

            echo "==> Restarting PM2..."
            pm2 delete movit-backend 2>/dev/null || true
            pm2 delete pose-backend 2>/dev/null || true
            pm2 start ecosystem.config.js --env production
            pm2 save

            echo "==> Deploy complete!"
