# XcodeGen spec — generates iosApp.xcodeproj from text (no fragile pbxproj by hand).
# On the Mac:  brew install xcodegen  &&  cd android-poc/iosApp  &&  xcodegen
name: iosApp
options:
  bundleIdPrefix: com.movit
  deploymentTarget:
    # Align with android-poc gradle ios-deployment-target (Compose MP 1.11 + Skiko).
    iOS: "18.0"
targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
    info:
      path: iosApp/Info.plist
      properties:
        CFBundleDisplayName: Movit
        CADisableMinimumFrameDurationOnPhone: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.movit.iosApp
        # Static framework produced by :feature:shell (baseName = MovitApp)
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../feature/shell/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-framework"
          - "MovitApp"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
        # Kotlin/Native no longer builds iosX64 in this project; keep Xcode's
        # simulator build on arm64 so Compose resource sync does not request x86_64.
        ONLY_ACTIVE_ARCH: YES
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
    preBuildScripts:
      - name: "Build MovitApp Kotlin framework"
        basedOnDependencyAnalysis: false
        script: |
          set -e
          # --- Java (Temurin from CI, /usr/libexec/java_home, or Homebrew) ---
          if [ -z "${JAVA_HOME:-}" ]; then
            if command -v /usr/libexec/java_home >/dev/null 2>&1; then
              export JAVA_HOME="$(/usr/libexec/java_home -v 17 2>/dev/null || /usr/libexec/java_home)"
            elif command -v brew >/dev/null 2>&1; then
              for formula in openjdk@17 openjdk java; do
                prefix="$(brew --prefix "$formula" 2>/dev/null || true)"
                if [ -n "$prefix" ] && [ -d "$prefix/libexec/openjdk.jdk/Contents/Home" ]; then
                  export JAVA_HOME="$prefix/libexec/openjdk.jdk/Contents/Home"
                  break
                elif [ -n "$prefix" ] && [ -x "$prefix/bin/java" ]; then
                  export JAVA_HOME="$prefix"
                  break
                fi
              done
            fi
          fi
          if [ -n "${JAVA_HOME:-}" ]; then
            export PATH="$JAVA_HOME/bin:$PATH"
          elif command -v java >/dev/null 2>&1; then
            export JAVA_HOME="$(dirname "$(dirname "$(readlink -f "$(command -v java)" 2>/dev/null || command -v java)")")"
            export PATH="$JAVA_HOME/bin:$PATH"
          else
            echo "error: Java 17 not found. Install Temurin 17 or run: brew install openjdk@17" >&2
            exit 1
          fi
          # --- Android SDK (optional; embed task may not need it on a pure iOS build) ---
          if [ -z "${ANDROID_HOME:-}" ]; then
            if command -v brew >/dev/null 2>&1; then
              brew_sdk="$(brew --prefix android-commandlinetools 2>/dev/null || true)"
              if [ -n "$brew_sdk" ] && [ -d "$brew_sdk" ]; then
                export ANDROID_HOME="$brew_sdk"
              fi
            fi
            if [ -z "${ANDROID_HOME:-}" ] && [ -d "$HOME/Library/Android/sdk" ]; then
              export ANDROID_HOME="$HOME/Library/Android/sdk"
            fi
          fi
          # --- Xcode ---
          if [ -z "${DEVELOPER_DIR:-}" ] && [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            export DEVELOPER_DIR="/Applications/Xcode.app/Contents/Developer"
          fi
          if [ "$SDK_NAME" = "iphonesimulator" ] || [[ "$SDK_NAME" == iphonesimulator* ]]; then
            export ARCHS="arm64"
          fi
          cd "$SRCROOT/.."
          ./gradlew :feature:shell:embedAndSignAppleFrameworkForXcode
