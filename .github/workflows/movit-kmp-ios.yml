name: Movit KMP iOS Compile

concurrency:
  group: movit-kmp-ios-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - 'kmp-app/**'
      - '.github/workflows/movit-kmp-ios.yml'
  pull_request:
    paths:
      - 'kmp-app/**'
      - '.github/workflows/movit-kmp-ios.yml'

jobs:
  ios-compile:
    name: KMP iOS compile + link + tests
    runs-on: macos-15
    defaults:
      run:
        working-directory: kmp-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # Compose MP 1.11 links UIKit LayoutRegion symbols; needs recent Xcode SDK.
          xcode-version: latest-stable

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Compile iOS app entrypoint
        run: |
          chmod +x ./gradlew
          ./gradlew --console=plain \
            :feature:shell:compileKotlinIosArm64 \
            :feature:shell:compileKotlinIosSimulatorArm64

      - name: Link MovitApp device framework
        run: |
          ./gradlew --console=plain \
            :feature:shell:linkDebugFrameworkIosArm64

      - name: Run KMP iOS simulator unit tests
        run: |
          ./gradlew --console=plain \
            :shared:iosSimulatorArm64Test \
            :core:data:iosSimulatorArm64Test \
            :core:network:iosSimulatorArm64Test \
            :feature:shell:iosSimulatorArm64Test \
            :feature:account:iosSimulatorArm64Test \
            :feature:library:iosSimulatorArm64Test

  ios-xcodebuild:
    name: Build iosApp (Xcode)
    runs-on: macos-15
    needs: ios-compile
    defaults:
      run:
        working-directory: kmp-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install XcodeGen and CocoaPods
        run: brew install xcodegen cocoapods

      - name: Fetch MediaPipe pose model
        working-directory: kmp-app
        run: |
          chmod +x scripts/fetch-pose-landmarker-model.sh
          ./scripts/fetch-pose-landmarker-model.sh

      - name: Generate Xcode workspace
        working-directory: kmp-app/iosApp
        run: xcodegen generate

      - name: Build iosApp for iOS Simulator
        working-directory: kmp-app/iosApp
        run: |
          xcodebuild \
            -workspace iosApp.xcworkspace \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            EXCLUDED_ARCHS=x86_64 \
            CODE_SIGNING_ALLOWED=NO \
            build
