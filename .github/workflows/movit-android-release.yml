name: Movit Android Release

concurrency:
  group: movit-android-release-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - 'android-poc/**'
      - '.github/workflows/movit-android-release.yml'
  pull_request:
    paths:
      - 'android-poc/**'
      - '.github/workflows/movit-android-release.yml'

jobs:
  assemble-release:
    name: contract tests + assembleRelease
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-poc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Contract + core + feature unit tests (Pre-07 WS-6)
        run: |
          chmod +x ./gradlew
          ./gradlew --console=plain \
            :core:network:testAndroidHostTest --tests "com.movit.core.network.contract.*" \
            :core:data:testDebugUnitTest \
            :core:training-engine:testDebugUnitTest \
            :feature:library:testDebugUnitTest \
            :feature:training:testDebugUnitTest

      - name: assembleRelease (Movit shell default)
        run: |
          ./gradlew --console=plain :app:assembleRelease

